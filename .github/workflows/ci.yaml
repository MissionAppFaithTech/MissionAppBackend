name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.16.0
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 24.16.0
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.16.0
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 24.16.0
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
