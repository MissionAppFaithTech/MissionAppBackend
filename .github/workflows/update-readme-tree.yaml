name: Update README Tree

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  tree:
    runs-on: ubuntu-latest
    name: readme-tree
    steps:
      - uses: actions/checkout@v4

      - name: Generate tree
        uses: RavelloH/readme-tree@latest
        with:
          showall: 'no'
          showdirectoryname: 'yes'

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'chore(docs): atualizar árvore de diretórios no README'
          title: 'chore(docs): atualizar árvore de diretórios no README'
          body: |
            Atualização automática da árvore de diretórios no README.

            Gerado por [readme-tree](https://github.com/RavelloH/readme-tree).
          branch: chore/update-readme-tree
          delete-branch: true
          labels: documentation
