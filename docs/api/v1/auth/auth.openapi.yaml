paths:
  /auth/login:
    post:
      operationId: authLogin
      tags: [auth]
      summary: Login
      description: >-
        Autentica com email e senha. Emite um access token JWT (15 min) e um
        refresh token opaco. Ambos sempre voltam no corpo da resposta — não há
        entrega via cookie nesta API, já que o consumidor web é um BFF
        (Next.js), não um browser. Ver ADR-0021, seção "Entrega de Tokens".
      security: []
      parameters:
        - $ref: '#/components/parameters/ClientType'
        - $ref: '#/components/parameters/DeviceName'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login realizado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Credenciais inválidas.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Erro de validação do corpo da requisição.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /auth/refresh:
    post:
      operationId: authRefresh
      tags: [auth]
      summary: Renovação de access token
      description: >-
        Rotaciona o refresh token e emite um novo access token. O refresh
        token vai sempre no corpo — não há mais fallback via cookie.
        Reutilizar um refresh token já rotacionado invalida toda a família de
        tokens da sessão (detecção de roubo — ver ADR-0021). O TTL do novo
        refresh token é recalculado a partir de agora (sliding window).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Novo par de tokens emitido.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: >-
            Refresh token ausente, inválido, expirado ou já revogado
            (reuso detectado — toda a família foi invalidada).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    delete:
      operationId: authLogout
      tags: [auth]
      summary: Logout (dispositivo atual)
      description: >-
        Bloqueia o access token atual (blocklist de `jti` no DragonflyDB) e
        revoga apenas a família de refresh token da sessão de origem — outras
        sessões do mesmo usuário não são afetadas. Para logout em todos os
        dispositivos, ver `DELETE /auth/sessions`. Ver ADR-0021.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout realizado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: Access token ausente, inválido ou já revogado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/sessions:
    get:
      operationId: authSessionsIndex
      tags: [auth]
      summary: Listar sessões ativas
      description: >-
        Lista as sessões (dispositivos) ativas do usuário autenticado — uma
        entrada por família de refresh token, ordenadas pela mais usada
        recentemente. `id` é o `family_id`, usado para revogar uma sessão
        específica em `DELETE /auth/sessions/{familyId}`.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de sessões ativas.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SessionSummary'
        '401':
          description: Access token ausente, inválido ou revogado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      operationId: authSessionsDestroyAll
      tags: [auth]
      summary: Logout em todos os dispositivos
      description: >-
        Encerra todas as sessões do usuário: incrementa o `auth_version`
        (invalida instantaneamente todos os access tokens ativos, de todos os
        dispositivos) e revoga todos os refresh tokens. Ação explícita,
        distinta do logout comum. Ver ADR-0021.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Todas as sessões foram encerradas.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: Access token ausente, inválido ou revogado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/sessions/{familyId}:
    delete:
      operationId: authSessionsDestroy
      tags: [auth]
      summary: Revogar sessão remota
      description: >-
        Revoga remotamente uma sessão/dispositivo específico, identificado
        pelo `id` retornado em `GET /auth/sessions`. O access token daquela
        sessão é rejeitado já na próxima requisição — via blocklist de
        família no DragonflyDB — sem esperar sua expiração natural de 15
        minutos. Ver ADR-0021.
      security:
        - bearerAuth: []
      parameters:
        - name: familyId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Sessão encerrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: Access token ausente, inválido ou revogado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Sessão não encontrada, ou pertence a outro usuário.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  parameters:
    ClientType:
      name: x-client-type
      in: header
      required: false
      description: >-
        `mobile` ou ausente (assume `web`). Não determina mais onde os tokens
        são entregues (sempre no corpo, em ambos os casos) — apenas a política
        de TTL do refresh token (sliding window mais longa para mobile) e o
        `deviceType` exibido em `GET /auth/sessions`.
      schema:
        type: string
        enum: [mobile]

    DeviceName:
      name: x-device-name
      in: header
      required: false
      description: >-
        Nome legível do dispositivo/cliente (ex: "iPhone 15", "Chrome no
        macOS"), exibido apenas em `GET /auth/sessions`.
      schema:
        type: string
        maxLength: 120

  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        password:
          type: string
          minLength: 8
          maxLength: 128

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    LoginResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            user:
              $ref: '#/components/schemas/UserSummary'
            accessToken:
              type: string
              description: >-
                JWT — payload contém sub, jti, role, auth_version, fid
                (family_id do refresh token). TTL de 15 min.
            refreshToken:
              type: string
              description: Token opaco — sempre presente, para qualquer cliente.

    UserSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        fullName:
          type: string
        email:
          type: string
          format: email
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SessionSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: family_id do refresh token — usado para revogar esta sessão.
        deviceType:
          type: string
          enum: [web, mobile]
        deviceName:
          type: [string, 'null']
        ipAddress:
          type: [string, 'null']
        lastUsedAt:
          type: [string, 'null']
          format: date-time
        createdAt:
          type: string
          format: date-time
        current:
          type: boolean
          description: Se é a sessão do access token usado nesta requisição.

    MessageResponse:
      type: object
      properties:
        message:
          type: string

    ErrorResponse:
      type: object
      properties:
        message:
          type: string

    ValidationErrorResponse:
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              rule:
                type: string
              field:
                type: string
