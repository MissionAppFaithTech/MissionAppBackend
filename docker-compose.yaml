services:
  postgres:
    image: postgres:18.4-alpine3.23
    container_name: ${POSTGRES_CONTAINER_NAME:-missionapp-pg}
    restart: on-failure:5
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_DATABASE}
    ports:
      - "${DB_HOST:-127.0.0.1}:${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 512M
    # networks:
    #   - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  postgres_data:
    driver: local
